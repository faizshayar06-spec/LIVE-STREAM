name: 24/7 Persistent Stream (Auto-Reconnect)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_stream]

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub max is usually 360 for standard runners

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Uses Node 20 (Fixes that warning)

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Start Loop Stream
        env:
          S1: ${{ secrets.STREAM_1_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Use a loop so if FFmpeg crashes, it restarts instantly without waiting for a new workflow
          while true; do
            ffmpeg -re -stream_loop -1 -i video6.mp4 -stream_loop -1 -i audio6.mp3 \
            -map 0:v:0 -map 1:a:0 -c:v libx264 -preset superfast -tune zerolatency \
            -g 60 -keyint_min 60 -sc_threshold 0 \
            -pix_fmt yuv420p -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "$S1" || echo "FFmpeg crashed, restarting in 5 seconds..."
            
            sleep 5
          done & 
          
          # This part handles the 6-hour GitHub timeout transition
          sleep 350m 
          
          echo "Approaching GitHub timeout. Triggering next workflow..."
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type": "restart_stream"}'
          
          exit 0
          
