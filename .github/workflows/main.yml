name: 24/7 Persistent Stream (Auto-Reconnect)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_stream]

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 355 # GitHub limit 360 hai, thoda pehle stop karna safe hai

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # FFmpeg install karne ki zarurat nahi, ubuntu-latest mein ye pehle se hota hai.
      # Agar error aata hai toh "ffmpeg -version" check karein.

      - name: Start Loop Stream
        env:
          S1: ${{ secrets.STREAM_1_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Check if FFmpeg is available
          ffmpeg -version || (sudo apt update && sudo apt install -y ffmpeg)

          # Optimized FFmpeg Command:
          # Background (&) hata kar direct chala rahe taaki error turant dikhe
          # Timeout command use kar rahe taaki 345 min baad ye ruk kar agla trigger kare
          
          timeout 345m ffmpeg -re -stream_loop -1 -i video.mp4 -stream_loop -1 -i audio.mp3 \
          -map 0:v:0 -map 1:a:0 -c:v libx264 -preset superfast -tune zerolatency \
          -g 60 -keyint_min 60 -sc_threshold 0 \
          -pix_fmt yuv420p -b:v 2500k -maxrate 2500k -bufsize 5000k \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "$S1" || echo "Stream stopped or reached timeout"

          # Next workflow trigger karna
          echo "Triggering next workflow..."
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type": "restart_stream"}'
          
          sleep 30s
          
